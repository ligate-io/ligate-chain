# cargo-audit config.
#
# Ignored advisories are tracked with clear rationale. Revisit every time we
# upgrade the Sovereign SDK rev (all current entries come from transitive
# deps pinned by the SDK at `f89964c6`).

[advisories]
ignore = [
    # rustls-webpki 0.101.7, reachable panic when parsing a CRL's
    # `onlySomeReasons` element. Only exploitable by apps that parse CRLs.
    # Ligate's TLS usage (Celestia DA client, JSON-RPC) does not parse CRLs,
    # so the panic is unreachable. Clears when SDK upgrades rustls.
    "RUSTSEC-2026-0104",

    # rustls-webpki 0.101.7, name constraints for URI names were ignored.
    # Only exploitable given CA misissuance, which is out of scope for our
    # threat model. Clears when SDK upgrades rustls.
    "RUSTSEC-2026-0098",

    # rustls-webpki 0.101.7, name constraints incorrectly accepted for
    # wildcard certs. Same misissuance precondition as 0098. Out of scope.
    "RUSTSEC-2026-0099",

    # bincode 1.3.3 unmaintained (upstream ceased development). Pulled
    # transitively by sov-db. Not a vulnerability; clears when the SDK
    # migrates to an actively maintained serializer.
    "RUSTSEC-2025-0141",

    # rustls-pemfile 1.0.4 unmaintained (superseded by rustls-pki-types).
    # Pulled transitively by jsonrpsee-http-client -> hyper-rustls.
    # Not a vulnerability; clears on SDK + jsonrpsee upgrade.
    "RUSTSEC-2025-0134",

    # astral-tokio-tar 0.5.6, low-severity (CVSS 1.7) directory traversal
    # via crafted entry names. Pulled by `testcontainers` (a test-only
    # dep of sov-test-utils). We do not extract user-supplied tar archives
    # in any production path; the only consumer is the SDK's docker-based
    # integration tests. Clears when sov-test-utils' testcontainers
    # transitively bumps astral-tokio-tar to >= 0.6.0.
    "RUSTSEC-2026-0066",

    # rsa 0.9.x Marvin attack (CVSS 5.9). Pulled by sqlx-mysql, which is
    # a transitive build-time dep of sov-db's optional sqlx integration.
    # No production code path uses MySQL or RSA decryption; the Marvin
    # attack requires a decryption oracle that we don't expose. No fixed
    # upgrade available upstream; clears when rsa crate is patched or
    # when SDK drops the sqlx-mysql dep.
    "RUSTSEC-2023-0071",

    # tracing-subscriber 0.2.25 ANSI-escape injection (log injection
    # class). Pulled deep transitively from Phase A.4's risc0
    # dependency: ark-relations -> ark-snark -> ark-crypto-primitives
    # -> ark-groth16 -> risc0-groth16 -> risc0-zkvm. Risc0 still
    # pins the old `tracing-subscriber` line because newer ark-* APIs
    # haven't been migrated to. We don't expose attacker-controlled
    # input to tracing subscribers in any code path, so the
    # log-injection vector isn't reachable. Clears when Risc0
    # upgrades the ark-* graph.
    "RUSTSEC-2025-0055",
]
