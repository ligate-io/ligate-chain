# Fluent Bit parsers for ligate-node + sibling services.
#
# `tracing_json` parses the JSON output `tracing_subscriber::fmt::format::json()`
# emits. Each log line is a self-describing JSON object; this parser
# pulls the structured fields out so the operator can filter by
# `level`, `target`, `span.name`, etc. in Cloud Logging's Logs Explorer.
#
# Tracking issue: ligate-io/ligate-chain#269.

[PARSER]
    Name         tracing_json
    Format       json
    Time_Key     timestamp
    Time_Format  %Y-%m-%dT%H:%M:%S.%LZ
    Time_Keep    On
    # The JSON's `level` field follows the tracing crate's conventions:
    # TRACE / DEBUG / INFO / WARN / ERROR. Cloud Logging accepts those
    # via the `severity_key` mapping in fluent-bit.conf.

# Celestia node logs are mostly unstructured (slog-style key=value).
# Pass them through unparsed for now; a future enhancement can write
# a regex parser that extracts the level + msg.
