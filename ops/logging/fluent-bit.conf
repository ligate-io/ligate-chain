# Fluent Bit config for shipping ligate-node + sibling-service logs
# to GCP Cloud Logging.
#
# Per the ADR in docs/development/runbooks/log-shipping.md, devnet
# picks GCP Cloud Logging (Option B in #269) for zero-infra reach.
# Fluent Bit is GCP's recommended agent for structured JSON ingestion.
#
# Sources:
#   - journald: ligate-node, celestia-light, faucet, prover
#   - tail:     /var/log/ligate/*.log (any future direct-to-file logs)
#
# Routing:
#   - parse JSON if it looks like JSON (tracing-subscriber's
#     `tracing_subscriber::fmt::format::json()` output)
#   - tag with service + host
#   - ship to Cloud Logging via the stackdriver output
#
# Tracking issue: ligate-io/ligate-chain#269.

[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf

# ---- Inputs --------------------------------------------------------

# ligate-node systemd unit
[INPUT]
    Name            systemd
    Tag             ligate-node
    Systemd_Filter  _SYSTEMD_UNIT=ligate-node.service
    Read_From_Tail  On

# Celestia light node
[INPUT]
    Name            systemd
    Tag             celestia-light
    Systemd_Filter  _SYSTEMD_UNIT=celestia-light.service
    Read_From_Tail  On

# Faucet (if co-located on this VM)
[INPUT]
    Name            systemd
    Tag             ligate-faucet
    Systemd_Filter  _SYSTEMD_UNIT=ligate-faucet.service
    Read_From_Tail  On

# Backup + snapshot publish runs (oneshot units; same name pattern)
[INPUT]
    Name            systemd
    Tag             ligate-backup
    Systemd_Filter  _SYSTEMD_UNIT=ligate-backup.service
    Read_From_Tail  On

[INPUT]
    Name            systemd
    Tag             ligate-snapshot
    Systemd_Filter  _SYSTEMD_UNIT=ligate-snapshot-publish.service
    Read_From_Tail  On

# ---- Filters -------------------------------------------------------

# Parse tracing-subscriber JSON output if present. ligate-node uses
# `tracing-subscriber::fmt::format::json()` so each log line is a
# self-describing JSON object with `timestamp`, `level`, `target`,
# `fields`, `spans`. Non-JSON lines (e.g. Celestia's native format)
# pass through unparsed.
[FILTER]
    Name           parser
    Match          ligate-*
    Key_Name       message
    Parser         tracing_json
    Reserve_Data   On

# Add host + service labels to every record for query partitioning.
[FILTER]
    Name           modify
    Match          *
    Add            host ${HOSTNAME}
    Add            chain_id ligate-devnet-2

# ---- Output --------------------------------------------------------

# Ship everything to GCP Cloud Logging. The stackdriver output uses
# the VM's metadata-server identity (no key file needed when running
# on a GCE instance with the right scopes; explicit key file path
# below for non-GCE hosts).
[OUTPUT]
    Name             stackdriver
    Match            *
    # Resource type — `gce_instance` if running on GCE, `generic_task`
    # for non-GCE. Pick at deploy time.
    resource         gce_instance
    google_service_credentials /etc/google/auth/application_default_credentials.json
    # Severity is read from the parsed JSON's `level` field via the
    # `severity_key` mapping below.
    severity_key     level
    # Send each tag as a separate Cloud Logging "log_name" so the
    # operator can filter by service in the Logs Explorer.
    log_name_key     log_name
    tag_prefix       ligate-
