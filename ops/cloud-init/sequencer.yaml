#cloud-config
# Cloud-init for a Ligate Chain sequencer VM (Ubuntu 24.04, GCP-tested).
#
# Use:
#   gcloud compute instances create ligate-devnet-1-sequencer \
#       --machine-type=e2-standard-4 \
#       --image-family=ubuntu-2404-lts-amd64 --image-project=ubuntu-os-cloud \
#       --boot-disk-size=20GB \
#       --create-disk=name=ligate-data,size=150GB,type=pd-ssd \
#       --metadata-from-file=user-data=ops/cloud-init/sequencer.yaml
#
# Provisions the "chassis" only:
#   - Build tooling (rustc, pkg-config, clang) so the operator can
#     `cargo build` on the box if a binary release isn't usable.
#   - `ligate` system user (uid is whatever useradd picks; the chain's
#     storage paths under /opt/ligate + /var/lib/ligate get chowned to
#     match).
#   - Persistent data disk mounted at /var/lib/ligate (with
#     `/var/lib/ligate/rocksdb` pre-created so the operator's storage
#     symlink in Step 3 of the deploy runbook lands somewhere valid).
#   - celestia-light v0.30.2 binary at /usr/local/bin/celestia, init
#     against Mocha, and a systemd unit that boots it under the
#     `ligate` user.
#   - ligate-node systemd unit (unstarted; the operator places the
#     binary + /etc/ligate/env separately before `systemctl start`).
#   - `chrony` explicitly enabled as belt-and-braces NTP; GCP provides
#     its own NTP via the metadata server but we don't depend on it.
#
# What this DOES NOT do:
#   - Place the ligate-node binary (operator copies from a release
#     tarball or builds from source — see deploy runbook Step 3).
#   - Place the devnet-1/ config dir (`git clone` step in the runbook).
#   - Place secrets in /etc/ligate/env (operator hand-writes; never
#     committed to repo).
#   - Start ligate-node.service (waits on the above).
#
# Idempotency: re-running cloud-init is safe — `useradd` short-circuits
# if the user exists, `mkdir -p` is no-op on existing dirs, `mkfs.ext4
# -F` would re-format the data disk so the wrapping shell block
# pre-checks for the existing filesystem.
#
# Drift from this file (e.g. `ExecStart` changes after-the-fact via
# /etc/systemd/system/) is OK in emergency triage; bring the in-VM
# state back in line by re-applying this cloud-init on the next
# rebuild, OR ssh + diff + commit a follow-up so the repo stays the
# source of truth.

package_update: true
package_upgrade: true

packages:
  - build-essential
  - pkg-config
  - libssl-dev
  - cmake
  - clang
  - curl
  - git
  - jq
  - rsync
  - chrony

write_files:
  - path: /etc/systemd/system/celestia-light.service
    content: |
      [Unit]
      Description=Celestia light node (Mocha)
      After=network-online.target
      Wants=network-online.target

      [Service]
      User=ligate
      ExecStart=/usr/local/bin/celestia light start \
          --core.ip rpc-mocha.pops.one \
          --p2p.network mocha \
          --rpc.addr 127.0.0.1 \
          --rpc.port 26658
      Restart=on-failure
      RestartSec=5
      LimitNOFILE=65536

      [Install]
      WantedBy=multi-user.target

  - path: /etc/systemd/system/ligate-node.service
    content: |
      [Unit]
      Description=Ligate Chain node (devnet-1)
      After=celestia-light.service network-online.target
      Wants=celestia-light.service

      [Service]
      User=ligate
      Group=ligate
      WorkingDirectory=/opt/ligate
      EnvironmentFile=/etc/ligate/env
      # `--mode` was removed in chain#446. Previously every VM booted
      # with `--mode ${LIGATE_MODE}` where VM-2 and VM-3 used `follower`
      # for "never compete for batch production." That model was
      # superseded by DbElected (chain#422): the Postgres lock gates
      # who produces, not a boot-time flag. The LIGATE_MODE env var is
      # still written by the metadata-fetch script below for backward
      # compatibility but is no longer consumed by ligate-node.
      ExecStart=/opt/ligate/bin/ligate-node \
          --da-layer celestia \
          --rollup-config-path /opt/ligate/devnet-1/celestia.toml \
          --genesis-config-dir /opt/ligate/devnet-1/genesis \
          --metrics-bind 127.0.0.1:9100
      Restart=on-failure
      RestartSec=10
      # RocksDB compaction + WAL flush on shutdown can take 2-3 min on a
      # hot state DB. The systemd default of 90s triggered a SIGKILL
      # during the v0.1.1-devnet swap on 2026-05-16 (chain#362). 300s
      # gives headroom without leaving zombie processes around forever.
      TimeoutStopSec=300
      LimitNOFILE=65536

      [Install]
      WantedBy=multi-user.target

runcmd:
  - useradd -m -s /bin/bash ligate
  - mkdir -p /opt/ligate/bin /etc/ligate /var/lib/ligate
  - chown ligate:ligate /opt/ligate /opt/ligate/bin /etc/ligate /var/lib/ligate
  # Mount the persistent data disk to /var/lib/ligate.
  #
  # Pre-check the device for an existing ext4 filesystem before
  # mkfs — a bare `mkfs.ext4 -F` on every boot would silently wipe
  # devnet state on every VM rebuild that reuses the persistent disk.
  # The `blkid` test is the standard idempotent guard: zero exit
  # means the filesystem already exists; non-zero means fresh disk.
  # The fstab append + mount are also idempotent (grep guard + bare
  # mount that no-ops if already mounted).
  - |
    DEVICE=$(readlink -f /dev/disk/by-id/google-ligate-data)
    if ! blkid "$DEVICE" >/dev/null 2>&1; then
      mkfs.ext4 -F "$DEVICE"
    fi
    if ! grep -q " /var/lib/ligate " /etc/fstab; then
      echo "$DEVICE /var/lib/ligate ext4 defaults,nofail 0 2" >> /etc/fstab
    fi
    mountpoint -q /var/lib/ligate || mount /var/lib/ligate
  # Pre-create the RocksDB directory on the persistent disk so the
  # operator's Step 3 symlink lands somewhere valid. Without this the
  # chain writes state to /opt/ligate/devnet-1/data-celestia on the
  # boot disk, and a VM image rebuild wipes the chain's local history.
  # See "Migrating an existing host to the persistent disk" in
  # docs/development/runbooks/backup-restore.md for the same path,
  # but applied after-the-fact on hosts that booted without this step.
  - mkdir -p /var/lib/ligate/rocksdb
  - chown ligate:ligate /var/lib/ligate/rocksdb
  # Install Rust + risc0 toolchain (sequencer only; follower can skip risc0).
  - sudo -u ligate bash -lc 'curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y'
  # Install Celestia light node binary. Newer Celestia releases ship
  # as a tar.gz (was a bare binary in earlier releases); extract and
  # install the `celestia` binary.
  - |
    CELESTIA_VERSION=v0.30.2
    curl -fsSL "https://github.com/celestiaorg/celestia-node/releases/download/${CELESTIA_VERSION}/celestia-node_Linux_x86_64.tar.gz" \
      -o /tmp/celestia.tar.gz
    tar -xzf /tmp/celestia.tar.gz -C /tmp/
    install -o root -g root -m 0755 /tmp/celestia /usr/local/bin/celestia
  - sudo -u ligate /usr/local/bin/celestia light init --p2p.network=mocha
  - systemctl daemon-reload
  - systemctl enable --now celestia-light.service
  # `chrony` is explicit belt-and-braces: GCP serves NTP via the
  # metadata server, but the chain's blob-submit timestamps + Celestia
  # tx signing both go sideways if the wall clock drifts more than
  # ~30s, so we don't want a transient metadata-server flake to put
  # the host out of sync.
  - systemctl enable --now chrony

  # ---------------------------------------------------------------------
  # Multi-instance config (chain#422): read per-VM identity + role from
  # GCP instance metadata, install the v0.2.4 ligate-node binary,
  # place devnet-1 config, write /etc/ligate/env, and start the
  # service. Per-instance metadata is set at create time:
  #
  #   gcloud compute instances create ligate-devnet-1-sequencer-2 \
  #       ... \
  #       --metadata=ligate-node-id=ligate-devnet-1-sequencer-2,ligate-mode=follower
  #
  # Defaults: node-id = `ligate-devnet-1-sequencer` (matches the
  # original single-instance VM-1) and mode = `sequencer`. So
  # re-running this cloud-init on VM-1 (or rebuilding it from this
  # template) keeps its identity stable and continues as the active
  # sequencer.
  # ---------------------------------------------------------------------

  # Fetch per-instance identity + role from GCP metadata server.
  # Then generate a read-only JWT against the co-located celestia-light
  # so the chain can authenticate to its local RPC. The light node
  # binds 127.0.0.1 + already requires JWT auth by default;
  # `celestia light auth read` reads the per-instance jwt-secret and
  # mints a token. Follower mode only needs read scope (no signing).
  - |
    LIGATE_NODE_ID=$(curl -fsSL -H "Metadata-Flavor: Google" \
      http://metadata.google.internal/computeMetadata/v1/instance/attributes/ligate-node-id 2>/dev/null \
      || echo "ligate-devnet-1-sequencer")
    LIGATE_MODE=$(curl -fsSL -H "Metadata-Flavor: Google" \
      http://metadata.google.internal/computeMetadata/v1/instance/attributes/ligate-mode 2>/dev/null \
      || echo "sequencer")
    CELESTIA_JWT=$(sudo -u ligate /usr/local/bin/celestia light auth read --p2p.network mocha 2>/dev/null | head -1)
    cat > /etc/ligate/env <<EOF
    # Auto-generated by cloud-init from GCP instance metadata. Hand
    # edits to LIGATE_NODE_ID / LIGATE_MODE / SOV_CELESTIA_RPC_AUTH_TOKEN
    # will be overwritten on the next cloud-init run; update the
    # instance metadata instead, or place secrets (signer key etc.)
    # in a sibling /etc/ligate/env.d/ drop-in not managed by cloud-init.
    LIGATE_NODE_ID=$LIGATE_NODE_ID
    LIGATE_MODE=$LIGATE_MODE
    # Co-located celestia-light JWT-RPC. Read-only scope is enough for
    # follower + sequencer (the SOV_CELESTIA_SIGNER_KEY handles blob
    # SUBMIT separately, talking to the public mocha-4 consensus gRPC).
    SOV_CELESTIA_RPC_URL=ws://127.0.0.1:26658
    SOV_CELESTIA_RPC_AUTH_TOKEN=$CELESTIA_JWT
    # The light node doesn't run gRPC; for blob submission we point at
    # the public Mocha consensus full-node. Sequencer mode also needs
    # SOV_CELESTIA_SIGNER_KEY (operator-placed, NOT in this file).
    SOV_CELESTIA_GRPC_URL=http://full.consensus.mocha-4.celestia-mocha.com:9090
    RUST_LOG=info,sov=info
    EOF
    chmod 640 /etc/ligate/env
    chown root:ligate /etc/ligate/env
    echo "cloud-init: identity=$LIGATE_NODE_ID mode=$LIGATE_MODE celestia-jwt=${#CELESTIA_JWT}chars" >&2

  # Install the v0.2.4 ligate-node binary from the published GitHub
  # Release. Pinned tag for reproducibility — bumping requires
  # editing this file and re-running cloud-init (or operator-side
  # `systemctl stop && curl + tar && systemctl start` for in-place
  # swaps, the same flow used during the v0.2.3 → v0.2.4 swap on
  # 2026-05-20).
  - |
    LIGATE_TAG=v0.2.7
    LIGATE_VERSION=0.2.5
    ARTIFACT="ligate-node-${LIGATE_VERSION}-linux-amd64.tar.gz"
    # Keep the artifact's original filename so `sha256sum -c` can find
    # it via the relative path written into the .sha256 file by the
    # release workflow. Renaming on download broke this on VM-2 (chain
    # PR #424 surfaced it during the first multi-instance VM create).
    cd /tmp
    curl -fsSL -o "$ARTIFACT" \
      "https://github.com/ligate-io/ligate-chain/releases/download/${LIGATE_TAG}/${ARTIFACT}"
    curl -fsSL -o "${ARTIFACT}.sha256" \
      "https://github.com/ligate-io/ligate-chain/releases/download/${LIGATE_TAG}/${ARTIFACT}.sha256"
    sha256sum -c "${ARTIFACT}.sha256"
    tar -xzf "$ARTIFACT"
    install -o ligate -g ligate -m 0755 \
      "ligate-node-${LIGATE_VERSION}-linux-amd64/ligate-node" \
      /opt/ligate/bin/ligate-node
    /opt/ligate/bin/ligate-node --version

  # Place devnet-1 config from the chain repo at the pinned tag.
  # Idempotent: --depth 1 + a fresh tmp clone every cloud-init run;
  # cp -rn so we don't clobber an operator-edited /opt/ligate/devnet-1/.
  - |
    LIGATE_TAG=v0.2.7
    rm -rf /tmp/ligate-chain
    git clone --depth 1 --branch ${LIGATE_TAG} \
      https://github.com/ligate-io/ligate-chain.git /tmp/ligate-chain
    mkdir -p /opt/ligate/devnet-1
    cp -rn /tmp/ligate-chain/devnet-1/. /opt/ligate/devnet-1/
    chown -R ligate:ligate /opt/ligate/devnet-1

  # Fetch the Celestia DA signer key from Secret Manager and place it
  # in a drop-in env file that systemd's `EnvironmentFile=-` (note the
  # leading dash: "optional file") picks up alongside the cloud-init
  # managed /etc/ligate/env.
  #
  # Why a drop-in: /etc/ligate/env gets rewritten on every cloud-init
  # run (it's templated from instance metadata). Secret material lives
  # separately so it's not clobbered.
  #
  # Why follower mode also needs the signer: today our `--mode
  # follower` still constructs the PreferredSequencer (which requires
  # `da.get_signer()` to return a value) even though follower never
  # actually posts blobs. Tracked at chain#426 to refactor away the
  # requirement; until then all node modes need the key.
  - |
    mkdir -p /etc/ligate/env.d
    SIGNER_HEX=$(gcloud secrets versions access latest \
      --secret=ligate-devnet-1-celestia-signer-key \
      --project=utopian-spring-494915-q1 2>/dev/null | tr -d '\r\n')
    if [ -n "$SIGNER_HEX" ]; then
      echo "SOV_CELESTIA_SIGNER_KEY=$SIGNER_HEX" > /etc/ligate/env.d/celestia-signer
      chown root:ligate /etc/ligate/env.d/celestia-signer
      chmod 640 /etc/ligate/env.d/celestia-signer
      echo "cloud-init: placed Celestia signer key drop-in (${#SIGNER_HEX} hex chars)" >&2
    else
      echo "cloud-init: WARNING — could not fetch Celestia signer from Secret Manager; ligate-node will fail until the operator places one." >&2
    fi

  # Add the drop-in EnvironmentFile to the ligate-node systemd unit
  # (idempotent: skips if the line already exists).
  - |
    UNIT=/etc/systemd/system/ligate-node.service
    if ! grep -q "EnvironmentFile=-/etc/ligate/env.d/celestia-signer" "$UNIT"; then
      sed -i '/^EnvironmentFile=\/etc\/ligate\/env$/a EnvironmentFile=-/etc/ligate/env.d/celestia-signer' "$UNIT"
    fi

  # Install Grafana Alloy and configure it to scrape ligate-node +
  # node-exporter, remote-writing to Grafana Cloud Mimir. The GC API
  # token comes from Secret Manager so this template doesn't embed
  # credentials. Same Mimir endpoint + same GC username across all
  # instances; the `instance` label on each scrape distinguishes which
  # VM the series came from (the Grafana dashboards filter on this
  # via chain#427).
  - |
    mkdir -p /etc/apt/keyrings
    curl -fsSL https://apt.grafana.com/gpg.key | gpg --dearmor --batch --yes -o /etc/apt/keyrings/grafana.gpg
    echo 'deb [signed-by=/etc/apt/keyrings/grafana.gpg] https://apt.grafana.com stable main' > /etc/apt/sources.list.d/grafana.list
    apt-get update -qq
    apt-get install -y alloy
    mkdir -p /etc/alloy

    gcloud secrets versions access latest \
      --secret=ligate-devnet-1-grafana-cloud-token \
      --project=utopian-spring-494915-q1 > /etc/alloy/grafana_cloud_token
    chown alloy:alloy /etc/alloy/grafana_cloud_token
    chmod 600 /etc/alloy/grafana_cloud_token

    # LIGATE_NODE_ID was templated into /etc/ligate/env earlier in the
    # cloud-init by the metadata-reading step above.
    LIGATE_NODE_ID=$(grep '^LIGATE_NODE_ID=' /etc/ligate/env | cut -d= -f2)
    cat > /etc/alloy/config.alloy <<ALLOYEOF
    // Grafana Alloy config for $LIGATE_NODE_ID. Scrapes ligate-node
    // (:9100) + in-process node_exporter, remote-writes to Grafana
    // Cloud Mimir. Same pattern as VM-1.

    local.file "gc_token" {
        filename = "/etc/alloy/grafana_cloud_token"
        is_secret = true
    }

    prometheus.scrape "ligate_node" {
        targets = [{
            __address__ = "127.0.0.1:9100",
            job         = "ligate-node",
            instance    = "$LIGATE_NODE_ID",
        }]
        scrape_interval = "15s"
        forward_to = [prometheus.remote_write.grafana_cloud.receiver]
    }

    prometheus.remote_write "grafana_cloud" {
        endpoint {
            url = "https://prometheus-prod-66-prod-us-east-3.grafana.net/api/prom/push"
            basic_auth {
                username = "3215654"
                password = local.file.gc_token.content
            }
        }
        wal {
            truncate_frequency = "2h"
        }
    }

    prometheus.exporter.unix "node" {
        disable_collectors = ["ipvs", "btrfs", "infiniband", "tapestats", "zfs"]
    }

    prometheus.scrape "node" {
        targets = prometheus.exporter.unix.node.targets
        job_name = "node"
        scrape_interval = "15s"
        forward_to = [prometheus.remote_write.grafana_cloud.receiver]
    }
    ALLOYEOF
    chown alloy:alloy /etc/alloy/config.alloy
    chmod 644 /etc/alloy/config.alloy
    systemctl enable --now alloy

  # Start ligate-node. Cloud-init has placed the binary, devnet-1
  # config, /etc/ligate/env (managed), and /etc/ligate/env.d/celestia-signer
  # (secret drop-in) above. Alloy is also up and scraping. Follower-mode
  # VMs sync state from DA without producing batches; sequencer-mode VMs
  # start producing immediately. Cutover to multi-sequencer DbElected
  # happens at the operator's discretion (chain#422).
  - systemctl daemon-reload
  - systemctl enable --now ligate-node.service
