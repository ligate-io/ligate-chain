[workspace]
resolver = "2"
members = [
    "crates/bootstrap-cli",
    "crates/modules/attestation",
    "crates/client-rs",
    "crates/genesis-tool",
    "crates/rollup",
    "crates/rollup/provers/risc0",
    "crates/stf",
    "crates/stf-declaration",
]
# `crates/rollup/provers/risc0/guest-celestia/` is excluded —
# it's a separate cargo workspace targeting the risc0 RISC-V
# triple, not our host toolchain. The outer `provers/risc0/`
# crate compiles it via `risc0-build`.
#
# `crates/modules/attestation/fuzz/` is excluded because cargo-fuzz
# crates require nightly + libfuzzer-sys, which doesn't build on
# stable. Run via `cargo +nightly fuzz build/run` from inside the
# fuzz dir. Tracking issue: #119.
exclude = [
    "crates/rollup/provers/risc0/guest-celestia",
    "crates/modules/attestation/fuzz",
]

[workspace.package]
version = "0.2.14"
edition = "2021"
license = "Apache-2.0 OR MIT"
authors = ["Ligate Labs <hello@ligate.io>"]
repository = "https://github.com/ligate-io/ligate-chain"
homepage = "https://ligate.io"
publish = false
rust-version = "1.93"

[workspace.dependencies]
# Sovereign SDK — pinned to the same rev that `sov-rollup-starter` uses.
# v0.3-era (known-compiling baseline). Bump alongside SDK upgrades.
sov-rollup-interface       = { git = "https://github.com/Sovereign-Labs/sovereign-sdk.git", rev = "f6cd64749edc56428fbeb7f22702458b0afb698a" }
sov-modules-api            = { git = "https://github.com/Sovereign-Labs/sovereign-sdk.git", rev = "f6cd64749edc56428fbeb7f22702458b0afb698a" }
sov-modules-stf-blueprint  = { git = "https://github.com/Sovereign-Labs/sovereign-sdk.git", rev = "f6cd64749edc56428fbeb7f22702458b0afb698a" }
sov-modules-rollup-blueprint = { git = "https://github.com/Sovereign-Labs/sovereign-sdk.git", rev = "f6cd64749edc56428fbeb7f22702458b0afb698a" }
