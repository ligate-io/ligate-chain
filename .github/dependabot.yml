# Dependabot config for ligate-chain.
#
# Two ecosystems we care about:
#   - cargo: workspace dependencies in Cargo.toml + transitives
#   - github-actions: pinned action versions in .github/workflows/
#
# Both run weekly on Monday morning Europe/Amsterdam to land in our
# review queue at the start of the work week. The five-PR cap on cargo
# avoids review-queue floods on weeks with many small bumps.
#
# Grouping rationale:
#
#   - sov-* crates are a single git-pinned Sovereign SDK rev. Bumping
#     them piecemeal would create incompatible PRs that don't compile;
#     group them so a Dependabot PR moves the whole rev together.
#   - risc0-* crates are released in lockstep. Same logic.
#
# Major-version bumps stay separate (default behaviour) so we eyeball
# each one rather than auto-grouping breaking changes.
#
# Auto-merge is deliberately not configured. Maintainers review every
# Dependabot PR until we have a track record of clean upgrades.
#
# Ignore rules cover crates whose newer versions are blocked by the
# Sovereign SDK rev we git-pin to. The SDK macros emit code against
# specific transitive-dep API shapes; bumping past what the SDK
# supports breaks compilation across half the workspace. Pattern when
# a Dependabot PR fails for this reason: close the PR, add the
# dep-name to the ignore list below, revisit when we bump the SDK
# pin in `Cargo.toml` to a rev that supports the newer API.

version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 5
    groups:
      sov-rollup-deps:
        patterns:
          - "sov-*"
        update-types:
          - "minor"
          - "patch"
      risc0:
        patterns:
          - "risc0-*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # schemars 1.x is a major-version bump with breaking API changes
      # (gen module renamed, schema_name() signature changed, schema
      # module became private). Sovereign SDK derive macros at our
      # pinned rev still consume the 0.8 API. Revisit when the SDK
      # rev we track adopts schemars 1.x. See closed #100.
      - dependency-name: "schemars"
        update-types: ["version-update:semver-major"]
      # strum 0.26 -> 0.27 reorganised VariantArray / VariantNames.
      # The SDK's #[derive(DispatchCall)] and friends emit code
      # against the 0.26 trait shapes. Pre-1.0 minor IS breaking
      # in semver terms here. Revisit on SDK rev bump. See closed #101.
      - dependency-name: "strum"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"
    labels:
      - "foundation"
      - "p2"
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 3
    labels:
      - "foundation"
      - "p2"
    commit-message:
      prefix: "deps(actions)"
      include: "scope"
