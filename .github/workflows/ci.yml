name: CI

on:
  push:
    branches: [main]
  pull_request:

# When a new push lands in the same branch, cancel any in-progress
# runs of this workflow on older commits. The default GitHub behaviour
# is to let stale runs finish, which burns runner minutes on builds
# whose code is already obsolete. Grouping by `(workflow, ref)` so
# main and PR branches each get their own queue.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  # Skip the heavy risc0 guest compilation in CI. The guest takes
  # ~10 minutes to build on a clean checkout and requires the
  # `risczero` toolchain installed; neither is worth it for the
  # check / clippy / test gates. Real guest builds happen in a
  # separate workflow (see `.github/workflows/prove.yml`, follow-
  # up). Without this, `ligate-prover-risc0`'s build script tries
  # to invoke `risc0-build` and fails on a missing toolchain.
  SKIP_GUEST_BUILD: "1"
  # Note: we deliberately do NOT set RISC0_SKIP_BUILD_KERNELS here.
  # That env var skips compiling risc0's CPU/GPU kernels, but the
  # Rust crates still reference the kernel symbols at link time —
  # so skipping them produces unresolved-symbol errors in `cargo
  # test`. Linux CI builds the CPU kernels cleanly without any
  # extra toolchain. Local macOS dev (where we're sometimes
  # missing the Metal SDK from a non-Xcode setup) is the case
  # where engineers set RISC0_SKIP_BUILD_KERNELS=1 in their
  # shell — it's a per-machine workaround, not a CI-wide one.

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
          components: clippy
      - name: Install libclang (librocksdb-sys build dep)
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
      - name: Install libclang (librocksdb-sys build dep)
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
      - name: Install libclang (librocksdb-sys build dep)
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang
      - uses: Swatinem/rust-cache@v2
      # Lib unit tests + integration tests. We deliberately skip
      # `--bins` / `--examples` / `--benches` because the
      # `ligate-node` binary has no `#[test]` items — building it
      # as a test executable just forces a full debug-profile link
      # pass that OOMs the free-tier runner (`collect2: ld
      # terminated with signal 7`). `cargo check` and `cargo
      # clippy` still cover the binary's typecheck.
      - run: cargo test --workspace --lib --tests
      # Doc tests have to run on their own — `cargo test` rejects
      # `--doc` mixed with target selectors.
      - run: cargo test --workspace --doc

  doc:
    name: cargo doc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
      - name: Install libclang (librocksdb-sys build dep)
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --document-private-items

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@cargo-audit
      # Ignores below are documented in audit.toml. Revisit on every
      # Sovereign SDK rev bump; all entries come from transitive deps
      # pinned by the SDK that we can't directly upgrade.
      - run: |
          cargo audit \
            --ignore RUSTSEC-2026-0104 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2025-0141 \
            --ignore RUSTSEC-2025-0134 \
            --ignore RUSTSEC-2026-0066 \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2025-0055
