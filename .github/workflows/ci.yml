name: CI

on:
  push:
    branches: [main]
  pull_request:

# When a new push lands in the same branch, cancel any in-progress
# runs of this workflow on older commits. The default GitHub behaviour
# is to let stale runs finish, which burns runner minutes on builds
# whose code is already obsolete. Grouping by `(workflow, ref)` so
# main and PR branches each get their own queue.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
          components: clippy
      - name: Install libclang (librocksdb-sys build dep)
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
      - name: Install libclang (librocksdb-sys build dep)
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
      - name: Install libclang (librocksdb-sys build dep)
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets

  doc:
    name: cargo doc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
      - name: Install libclang (librocksdb-sys build dep)
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --document-private-items

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@cargo-audit
      # Ignores below are documented in audit.toml. Revisit on every
      # Sovereign SDK rev bump; all entries come from transitive deps
      # pinned by the SDK that we can't directly upgrade.
      - run: |
          cargo audit \
            --ignore RUSTSEC-2026-0104 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2025-0141 \
            --ignore RUSTSEC-2025-0134 \
            --ignore RUSTSEC-2026-0066 \
            --ignore RUSTSEC-2023-0071
