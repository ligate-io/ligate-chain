name: CI

on:
  push:
    branches: [main]
  pull_request:

# When a new push lands in the same branch, cancel any in-progress
# runs of this workflow on older commits. The default GitHub behaviour
# is to let stale runs finish, which burns runner minutes on builds
# whose code is already obsolete. Grouping by `(workflow, ref)` so
# main and PR branches each get their own queue.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  # Skip the heavy risc0 guest compilation in CI. The guest takes
  # ~10 minutes to build on a clean checkout and requires the
  # `risczero` toolchain installed; neither is worth it for the
  # check / clippy / test gates. Real guest builds happen in a
  # separate workflow (see `.github/workflows/prove.yml`, follow-
  # up). Without this, `ligate-prover-risc0`'s build script tries
  # to invoke `risc0-build` and fails on a missing toolchain.
  SKIP_GUEST_BUILD: "1"
  # Note: we deliberately do NOT set RISC0_SKIP_BUILD_KERNELS here.
  # That env var skips compiling risc0's CPU/GPU kernels, but the
  # Rust crates still reference the kernel symbols at link time —
  # so skipping them produces unresolved-symbol errors in `cargo
  # test`. Linux CI builds the CPU kernels cleanly without any
  # extra toolchain. Local macOS dev (where we're sometimes
  # missing the Metal SDK from a non-Xcode setup) is the case
  # where engineers set RISC0_SKIP_BUILD_KERNELS=1 in their
  # shell — it's a per-machine workaround, not a CI-wide one.

jobs:
  # Detect whether the PR or push touches anything that affects the
  # Rust build. Docs-only PRs (README, /docs, license, gitignore,
  # issue templates) don't need fmt/clippy/check/test/doc to run -
  # they can't change the compile result. The `code` output is
  # consumed by every code-checking job below; if it's `false`, those
  # jobs are skipped and the `CI pass` summary at the bottom accepts
  # the skipped state as a pass.
  #
  # `cargo audit` deliberately ignores this filter: new RUSTSEC
  # advisories appear independent of our diff, so we want every PR
  # (including docs PRs) to surface them.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          # Negative-list filter: every path is "code" *except* the
          # patterns below. Safer default than enumerating code paths
          # because anything new (a new crate, a new toml, a new
          # workflow) is gated on as code by default.
          filters: |
            code:
              - '**'
              - '!**.md'
              - '!docs/**'
              - '!LICENSE*'
              - '!.gitignore'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/CODEOWNERS'

  fmt:
    name: cargo fmt
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
          components: clippy
      - name: Install libclang (librocksdb-sys build dep)
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  check:
    name: cargo check
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
      - name: Install libclang (librocksdb-sys build dep)
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets

  test:
    name: cargo test
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
      - name: Install libclang (librocksdb-sys build dep)
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang
      - uses: Swatinem/rust-cache@v2
      # Lib unit tests + integration tests. We deliberately skip
      # `--bins` / `--examples` / `--benches` because the
      # `ligate-node` binary has no `#[test]` items — building it
      # as a test executable just forces a full debug-profile link
      # pass that OOMs the free-tier runner (`collect2: ld
      # terminated with signal 7`). `cargo check` and `cargo
      # clippy` still cover the binary's typecheck.
      - run: cargo test --workspace --lib --tests
      # Doc tests have to run on their own — `cargo test` rejects
      # `--doc` mixed with target selectors.
      - run: cargo test --workspace --doc

  doc:
    name: cargo doc
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0
      - name: Install libclang (librocksdb-sys build dep)
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --document-private-items

  # `cargo audit` runs on every PR including docs-only changes.
  # New RUSTSEC advisories can appear at any time independent of the
  # diff, and we want every PR to be a checkpoint for security
  # signal even if it's just a typo fix.
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@cargo-audit
      # Ignores below are documented in audit.toml. Revisit on every
      # Sovereign SDK rev bump; all entries come from transitive deps
      # pinned by the SDK that we can't directly upgrade.
      - run: |
          cargo audit \
            --ignore RUSTSEC-2026-0104 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2025-0141 \
            --ignore RUSTSEC-2025-0134 \
            --ignore RUSTSEC-2026-0066 \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2025-0055

  # Single summary check that the branch ruleset can require. By
  # gating only on `CI pass`, docs-only PRs (where fmt/clippy/check/
  # test/doc are skipped by `paths-filter`) can still merge: this job
  # accepts `skipped` as a pass for the code-checking jobs when the
  # `changes` job reported no code change. Real failures still fail.
  #
  # Replaces the previous setup where each individual job was a
  # required check, which would deadlock docs-only PRs forever.
  ci-pass:
    name: CI pass
    if: always()
    needs: [changes, fmt, clippy, check, test, doc, audit]
    runs-on: ubuntu-latest
    steps:
      - name: Verify required checks
        env:
          CODE_CHANGED: ${{ needs.changes.outputs.code }}
          AUDIT_RESULT: ${{ needs.audit.result }}
          FMT_RESULT: ${{ needs.fmt.result }}
          CLIPPY_RESULT: ${{ needs.clippy.result }}
          CHECK_RESULT: ${{ needs.check.result }}
          TEST_RESULT: ${{ needs.test.result }}
          DOC_RESULT: ${{ needs.doc.result }}
        run: |
          set -euo pipefail
          fail=0

          # cargo audit runs on every PR; it must succeed.
          if [[ "$AUDIT_RESULT" != "success" ]]; then
            echo "::error::cargo audit: $AUDIT_RESULT"
            fail=1
          fi

          # Docs-only change: code-checking jobs are correctly skipped.
          # Otherwise: every code-checking job must succeed.
          if [[ "$CODE_CHANGED" == "true" ]]; then
            for var in FMT_RESULT CLIPPY_RESULT CHECK_RESULT TEST_RESULT DOC_RESULT; do
              result="${!var}"
              if [[ "$result" != "success" ]]; then
                echo "::error::${var,,}: $result"
                fail=1
              fi
            done
          else
            echo "Docs-only change. Code-checking jobs correctly skipped."
          fi

          if [[ $fail -ne 0 ]]; then exit 1; fi
          echo "All required checks succeeded."
