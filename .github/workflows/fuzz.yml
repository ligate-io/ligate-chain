name: Fuzz

# Nightly cargo-fuzz run across the protocol's untrusted-byte
# decoders. Pairs with `cargo audit` and `cargo deny`: those gate
# advisories and licenses, this gates panic surfaces in our own code.
#
# Tracking issue: #119.
#
# Cron-only by design. Every-PR fuzzing would burn runner minutes
# without a corpus to feed; nightly buys continuous coverage at
# ~10 min budget across all targets.

on:
  schedule:
    - cron: '0 3 * * *'  # Nightly 03:00 UTC
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # libfuzzer-sys statically links the runtime; no DYLD/LD_LIBRARY_PATH
  # tweaks needed on Linux runners. Local macOS users may need to set
  # LIBCLANG_PATH; see CONTRIBUTING.md.

jobs:
  fuzz:
    name: cargo fuzz
    runs-on: ubuntu-latest
    # Cold build is ~20 min (sanitizer-instrumented compile of the
    # whole chain dep tree pulled in by `sov-test-utils` via the
    # SDK-fork patch block added in #330), then 10 targets × ~60s =
    # ~10 min runs. The previous 30-min cap got blown by the
    # cache-save tail once #330 fattened the build; 60 leaves real
    # headroom. Warm runs (post `cache-on-failure` below) should
    # land in ~10-15 min.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Install libclang (librocksdb-sys build dep)
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang

      - uses: Swatinem/rust-cache@v2
        with:
          # Cache scoped to the fuzz crate; avoids polluting the host
          # workspace cache with sanitizer-flavoured builds.
          workspaces: |
            crates/modules/attestation/fuzz
          # Save the cache even when the job fails or is cancelled.
          # Default `false` discards the multi-GB sanitizer `target/`
          # whenever a run times out or libfuzzer finds a crash, which
          # forces a ~20 min cold rebuild on every subsequent nightly
          # (same trap `mocha-smoke.yml` hit until the cache-on-failure
          # fix landed there).
          cache-on-failure: true

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Build all fuzz targets
        working-directory: crates/modules/attestation/fuzz
        run: cargo +nightly fuzz build

      # Per-target time budget. 60 seconds × 10 targets = ~10 min
      # runtime. Each target re-uses the build artifact from the
      # previous step so the only cost here is fuzzing time. The
      # REST extractor targets (rest_*) added in #157 share the
      # budget; each is ~60s. Total well under the 60-min job cap.
      - name: Run targets
        working-directory: crates/modules/attestation/fuzz
        run: |
          set -euo pipefail
          for target in \
            borsh_call_message \
            borsh_schema \
            borsh_attestor_set \
            borsh_attestation \
            borsh_signed_payload \
            bech32_id \
            attestation_id_parse \
            rest_schema_path \
            rest_attestor_set_path \
            rest_attestation_path
          do
            echo "::group::$target"
            cargo +nightly fuzz run "$target" -- -max_total_time=60
            echo "::endgroup::"
          done

      # If any target found a crash, libfuzzer writes the input to
      # `fuzz/artifacts/<target>/crash-*`. Surface it as a workflow
      # artifact so we can pull the input locally and reproduce.
      - name: Upload crash artifacts (if any)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-crashes-${{ github.run_id }}
          path: crates/modules/attestation/fuzz/artifacts/**
          if-no-files-found: ignore
          retention-days: 14
