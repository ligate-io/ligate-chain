name: Mocha smoke

# Recurring smoke against real Celestia Mocha. Companion to the
# manual procedure in `docs/development/runbooks/mocha-smoke.md`.
# This workflow exercises steps 1-7 of that runbook in CI.
#
# Active. Runs nightly at 06:00 UTC plus on-demand via
# `workflow_dispatch`. Gated by the `MOCHA_SMOKE_ENABLED` repo
# variable (set to `true`) and the `MOCHA_TIA_SIGNER_KEY` repo secret
# (the funded Mocha wallet's hex private key). Killing the variable
# is the kill-switch if Mocha or pops.one has a bad day.
#
# Tracking issue: ligate-io/ligate-chain#285.

on:
  # Operator-triggered one-shot runs. Use this for ad-hoc smokes
  # outside the nightly cadence (e.g. validating a workflow change).
  workflow_dispatch:
    inputs:
      branch:
        description: 'Chain branch to smoke (default: main)'
        required: false
        default: 'main'

  # Nightly at 06:00 UTC. Catches Celestia upgrades, DA adapter
  # regressions, blob-submission breakage, and TIA-balance issues
  # before the operator notices them in business hours.
  schedule:
    - cron: '0 6 * * *'

env:
  CARGO_TERM_COLOR: always
  SKIP_GUEST_BUILD: "1"
  # Note: we deliberately do NOT set RISC0_SKIP_BUILD_KERNELS here.
  # That env var skips compiling risc0's CPU/GPU kernels, but
  # `ligate-node` still references the kernel symbols at link time
  # so skipping them produces unresolved-symbol errors. Same
  # rationale as `ci.yml`.
  CONSTANTS_MANIFEST_PATH: ${{ github.workspace }}/constants.toml
  # Build-speed overrides for the release profile, scoped to this
  # workflow only (no Cargo.toml change). The smoke needs a binary
  # that runs correctly, not a maximally-optimised one: parallelise
  # codegen (the repo profile pins `codegen-units = 1`) and skip the
  # slow LTO link pass. Cuts the cold build materially; correctness
  # is unaffected.
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "256"
  CARGO_PROFILE_RELEASE_LTO: "false"

jobs:
  smoke:
    name: ligate-node + Mocha smoke
    runs-on: ubuntu-latest
    # Guard: skip if the operator hasn't set the TIA signer key. The
    # workflow exists for documentation purposes until that's wired.
    if: ${{ vars.MOCHA_SMOKE_ENABLED == 'true' }}
    # Cold-cache build (first run with no Swatinem cache hit) takes
    # ~50 min on a hosted runner because of risc0 kernel + heavy
    # crate compilation; allow generous margin so the initial smoke
    # isn't killed by the job wall. Warm runs land in 10-15 min.
    timeout-minutes: 90
    env:
      # Funded Mocha TIA wallet. Provided as a repo secret.
      SOV_CELESTIA_SIGNER_KEY: ${{ secrets.MOCHA_TIA_SIGNER_KEY }}
      # Mocha bridge to use. Default to pops.one; override via the
      # `MOCHA_BRIDGE` repo variable if needed (e.g. switching to a
      # backup bridge during pops.one maintenance).
      MOCHA_BRIDGE: ${{ vars.MOCHA_BRIDGE || 'rpc-mocha.pops.one' }}
      # Celestia consensus gRPC endpoint, for blob submission
      # (`MsgPayForBlobs`). `ligate-node`'s Celestia adapter needs this
      # in addition to the light-node RPC: the RPC reads headers/blobs,
      # the gRPC submits them. `devnet/celestia.toml` deliberately
      # omits `grpc_url` so this env var is the single source of truth
      # (a hardcoded value in the TOML would shadow it -- same trap as
      # `signer_private_key`). The runner has no co-located
      # `celestia-appd`, so this points at a public Mocha consensus
      # endpoint; override via the `MOCHA_GRPC_URL` repo variable to
      # switch providers (e.g. during pops.one maintenance).
      #
      # 2026-06-01: the previous fallback (`full.consensus.mocha-4.celestia-mocha.com:9090`)
      # went unreachable around the v9 fork. `rpc-mocha.pops.one:9090` is
      # what the production sequencer + every other surviving Mocha
      # operator points at; matching that here keeps the smoke and prod
      # paths on the same consensus core.
      SOV_CELESTIA_GRPC_URL: ${{ vars.MOCHA_GRPC_URL || 'http://rpc-mocha.pops.one:9090' }}
      # `celestia1...` bech32 of the operator's TIA wallet. Public
      # value (derived from the public key of `MOCHA_TIA_SIGNER_KEY`),
      # so it lives in a repo variable rather than a secret. Used to
      # patch `seq_da_address` in the ephemeral genesis before chain
      # boot; the chain validates that the registered sequencer's
      # DA address matches the wallet signing blob submissions.
      MOCHA_TIA_DA_ADDRESS: ${{ vars.MOCHA_TIA_DA_ADDRESS }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.0

      - name: Install libclang
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang

      # `cache-on-failure: true` is the important bit. Every prior
      # smoke run failed at the `Run smoke` step, which is AFTER the
      # build -- and rust-cache's default (`cache-on-failure: false`)
      # discards the build cache whenever the job fails. So every run
      # rebuilt ~50 min cold and never once got the "cached re-runs"
      # the comment below promises. Saving on failure lets the next
      # run restore the multi-GB `target/` and land the build in
      # minutes.
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      # Build ligate-node + ligate-genesis-tool. The genesis-tool
      # generates the ephemeral genesis below. Cold-cache build is
      # ~50 min; cached re-runs ~2 min. `ligate-cli` is no longer in
      # this workspace (extracted to `ligate-io/ligate-cli`); the next
      # step downloads its released binary.
      - name: Build chain binaries
        run: |
          cargo build --release --bin ligate-node --bin ligate-genesis-tool

      # Download the released `ligate` user-facing CLI binary. Pinned
      # to a known-good version so the smoke isn't at the mercy of
      # the latest cli release (a wire-format-breaking cli release
      # would otherwise silently break the smoke). Bump this pin in
      # the same PR as any cli release that breaks back-compat with
      # the chain.
      - name: Download ligate-cli release
        run: |
          set -euo pipefail
          LIGATE_CLI_TAG=v0.2.2
          BASE="https://github.com/ligate-io/ligate-cli/releases/download/${LIGATE_CLI_TAG}"
          ARCHIVE="ligate-cli-${LIGATE_CLI_TAG}-linux-amd64.tar.gz"
          curl -fsSL -o "/tmp/${ARCHIVE}" "${BASE}/${ARCHIVE}"
          curl -fsSL -o "/tmp/${ARCHIVE}.sha256" "${BASE}/${ARCHIVE}.sha256"
          (cd /tmp && sha256sum -c "${ARCHIVE}.sha256")
          tar -xzf "/tmp/${ARCHIVE}" -C /tmp/
          sudo install -m 0755 "/tmp/ligate-cli-${LIGATE_CLI_TAG}-linux-amd64/ligate" /usr/local/bin/ligate
          ligate --version

      # Install + initialize the Celestia light node. Pin to a known
      # version; bump as upstream releases land. Asset name is the
      # tarball; extract the `celestia` binary out of it.
      #
      # 2026-06-01: Mocha hard-forked to celestia-app v9; v0.30.2 and
      # earlier reject every new header ("version 9, this node supports
      # up to version 8") and freeze the light node. v0.31.0-mocha was
      # the first release with v9 support; v0.31.1-mocha is the current
      # patch. Same fork is what took down the public sequencer VM the
      # week of 06-01 -- runbook `docs/development/runbooks/mocha-smoke.md`
      # carries the operator-side note.
      - name: Install Celestia light node
        run: |
          CELESTIA_VERSION=v0.31.1-mocha
          curl -fL "https://github.com/celestiaorg/celestia-node/releases/download/${CELESTIA_VERSION}/celestia-node_Linux_x86_64.tar.gz" \
            -o /tmp/celestia.tar.gz
          tar -xzf /tmp/celestia.tar.gz -C /usr/local/bin celestia
          chmod +x /usr/local/bin/celestia
          celestia version
          celestia light init --p2p.network=mocha

      - name: Start Celestia light node
        run: |
          # `--rpc.skip-auth`: the light node's RPC enforces JWT
          # permissions by default, and `ligate-node` connects without
          # a token (`rpc_auth_token` is unset), so read calls like
          # `NetworkHead` get rejected with "missing permission". This
          # is a localhost-only node on an ephemeral CI runner -- not
          # reachable from outside -- so skipping auth is safe here and
          # avoids plumbing a token through. Real deploys keep auth on
          # and set `SOV_CELESTIA_RPC_AUTH_TOKEN`.
          nohup celestia light start \
              --core.ip "${MOCHA_BRIDGE}" \
              --p2p.network mocha \
              --rpc.addr 127.0.0.1 \
              --rpc.port 26658 \
              --rpc.skip-auth \
              > /tmp/celestia.log 2>&1 &
          # Wait for the light node to catch up to the Mocha network
          # head (LocalHead within 10 blocks of NetworkHead), NOT just
          # to "have some header." Why: a freshly-started light node
          # reports LocalHead = trusted-state anchor (often thousands
          # of blocks behind the live network head) and ramps up over
          # ~30-90s as DAS pulls and verifies recent headers. If we
          # anchor `genesis_da_height` at this initial LocalHead - 50,
          # the chain boots way behind the live network head — boot
          # succeeds, slot encoding passes — but the sequencer's
          # `accept_tx` precondition (`synced_da_height` near
          # `target_da_height`) refuses tx submission with a 503
          # `Syncing` error for the hours it would take chain to walk
          # forward to live head. This was an invisible bug in the
          # tx-less smoke; #333 surfaced it. JSON-RPC docs:
          # https://node-rpc-docs.celestia.org/?version=v0.30.x
          #
          # `--rpc.skip-auth` is set above, so no token is needed.
          echo "Waiting for light node to catch up to NetworkHead..."
          HEAD=0
          NETWORK_HEAD=0
          for i in {1..120}; do
              HEAD=$(curl -s -X POST http://127.0.0.1:26658 \
                  -H 'Content-Type: application/json' \
                  -d '{"jsonrpc":"2.0","id":1,"method":"header.LocalHead","params":[]}' \
                  | jq -r '.result.header.height // .result.height // 0' 2>/dev/null) || HEAD=0
              NETWORK_HEAD=$(curl -s -X POST http://127.0.0.1:26658 \
                  -H 'Content-Type: application/json' \
                  -d '{"jsonrpc":"2.0","id":1,"method":"header.NetworkHead","params":[]}' \
                  | jq -r '.result.header.height // .result.height // 0' 2>/dev/null) || NETWORK_HEAD=0
              if [ "${HEAD:-0}" -gt 0 ] && [ "${NETWORK_HEAD:-0}" -gt 0 ]; then
                  GAP=$((NETWORK_HEAD - HEAD))
                  if [ "$GAP" -le 10 ]; then
                      echo "Light node caught up: LocalHead=${HEAD}, NetworkHead=${NETWORK_HEAD} (gap=${GAP})."
                      break
                  fi
                  echo "  iter $i: LocalHead=${HEAD}, NetworkHead=${NETWORK_HEAD}, gap=${GAP}"
              fi
              sleep 5
          done
          # Hard-fail if the light node never caught up; without this
          # the workflow would proceed with a bad anchor and trip the
          # exact 503 Syncing trap that motivated this wait.
          GAP=$((NETWORK_HEAD - HEAD))
          if [ "${HEAD:-0}" -le 0 ] || [ "${NETWORK_HEAD:-0}" -le 0 ] || [ "$GAP" -gt 10 ]; then
              echo "FAIL: light node didn't catch up within 10 min (LocalHead=${HEAD}, NetworkHead=${NETWORK_HEAD}, gap=${GAP})." >&2
              exit 1
          fi

      # Generate ephemeral keys + run `ligate-genesis-tool` to produce
      # a valid genesis bundle. The checked-in `devnet/genesis/`
      # ships with placeholder addresses that fail strict genesis
      # validation. The real operator path runs this same flow with
      # operator-controlled keys; for CI we generate ephemeral keys
      # every run and burn them at job end.
      #
      # All four substitutions (three `lig1*` rollup addresses + the
      # Celestia DA address) go through the genesis-tool's substitution
      # map. `--da celestia` is the default; `generate` runs the same
      # validator the chain runs at startup against the output.
      #
      # `genesis_da_height` is patched in afterwards, not via the
      # substitution map: it's a runtime value (a live Mocha height),
      # not a static string the map can express.
      - name: Generate ephemeral genesis for CI smoke
        run: |
          set -euo pipefail
          mkdir -p /tmp/keys
          ./target/release/ligate-genesis-tool keys generate \
              --roles operator,demo1,demo2 \
              --output /tmp/keys

          OPERATOR=$(cat /tmp/keys/operator.address)
          DEMO1=$(cat /tmp/keys/demo1.address)
          DEMO2=$(cat /tmp/keys/demo2.address)

          cat > /tmp/keys.toml <<EOF
          [addresses]
          "lig1zd9j2z6x55ydnv9m8f0pdw3vs2j8u0w5sdqeaf478dzp6s998ac" = "$OPERATOR"
          "lig19tzzufavjqtzgwt58nqjs43gx0j3swsmxcmz9c9uv2suy5hj544" = "$DEMO1"
          "lig1e0lp7e5tzl49dfe0nz0xx46ks3hv7ehw9af2xy6n22ygjmnj4sz" = "$DEMO2"
          "celestia1qqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqzf30as" = "$MOCHA_TIA_DA_ADDRESS"
          EOF

          ./target/release/ligate-genesis-tool generate \
              --template devnet/genesis \
              --substitutions /tmp/keys.toml \
              --output /tmp/genesis \
              --da celestia

          # Anchor the ephemeral genesis to a live Mocha height. The
          # checked-in `devnet/genesis/chain_state.json` ships
          # `genesis_da_height: 0` (a placeholder; the real devnet-2
          # launch pins it at launch time). Booting against Mocha with
          # height 0 makes `ligate-node` request DA block 0, which
          # Celestia rejects with "height is equal to 0". Back off 50
          # blocks from the light node's synced tip so the anchor block
          # is comfortably inside its store.
          #
          # The height comes from the light node's JSON-RPC directly
          # (curl, not the `celestia rpc` CLI -- that CLI's stdout is
          # not jq-parseable). On any extraction failure, dump the raw
          # response and fail loudly rather than guessing.
          HEAD_RESP=$(curl -s -X POST http://127.0.0.1:26658 \
              -H 'Content-Type: application/json' \
              -d '{"jsonrpc":"2.0","id":1,"method":"header.LocalHead","params":[]}')
          MOCHA_HEIGHT=$(echo "$HEAD_RESP" \
              | jq -r '.result.header.height // .result.height // empty' 2>/dev/null || true)
          if ! [[ "$MOCHA_HEIGHT" =~ ^[0-9]+$ ]]; then
              echo "FAIL: could not read a numeric Mocha height from the light node RPC." >&2
              echo "Raw header.LocalHead response: ${HEAD_RESP}" >&2
              exit 1
          fi
          DA_HEIGHT=$((MOCHA_HEIGHT - 50))
          if [ "$DA_HEIGHT" -lt 1 ]; then
              echo "FAIL: Mocha height ${MOCHA_HEIGHT} too low to anchor genesis." >&2
              exit 1
          fi
          echo "Mocha synced height ${MOCHA_HEIGHT}; anchoring genesis_da_height at ${DA_HEIGHT}"
          jq --argjson h "$DA_HEIGHT" '.genesis_da_height = $h' \
              /tmp/genesis/chain_state.json > /tmp/chain_state.patched.json
          mv /tmp/chain_state.patched.json /tmp/genesis/chain_state.json

          echo "Ephemeral genesis ready at /tmp/genesis"
          echo "GENESIS_DIR=/tmp/genesis" >> "$GITHUB_ENV"

      # The actual chain smoke. Spawns ligate-node against the live
      # mocha light node, waits for slot 3, asserts bech32m encodings
      # on every hash type, asserts DA metrics increment.
      - name: Run smoke
        # 25-min budget: ~5 min boot + chain identity + slot encoding,
        # then up to ~10 min waiting on Celestia finalization (which
        # is the long pole — Mocha block time ~6s, plus the rollup's
        # `da_polling_interval_ms` 500ms, then the rollup's own batch
        # commitment loop). Comfortable margin above the ~12 min
        # observed worst case.
        timeout-minutes: 25
        run: |
          set -euo pipefail

          # Start ligate-node in the background
          nohup ./target/release/ligate-node \
              --da-layer celestia \
              --rollup-config-path devnet/celestia.toml \
              --genesis-config-dir "${GENESIS_DIR}" \
              --metrics-bind 127.0.0.1:9100 \
              > /tmp/ligate-node.log 2>&1 &
          NODE_PID=$!
          # Cleanup on exit
          trap "kill $NODE_PID 2>/dev/null || true; sleep 1; cat /tmp/ligate-node.log | tail -50" EXIT

          # Wait for the REST API to come up
          for i in {1..60}; do
              if curl -sf http://127.0.0.1:12346/v1/rollup/info >/dev/null 2>&1; then
                  break
              fi
              sleep 2
          done

          # === Step 2: chain identity ===
          echo "=== chain identity ==="
          INFO=$(curl -sf http://127.0.0.1:12346/v1/rollup/info)
          echo "$INFO" | jq
          CHAIN_HASH=$(echo "$INFO" | jq -r .chain_hash)
          if [[ "$CHAIN_HASH" != lsch1* ]]; then
              echo "FAIL: chain_hash is not bech32m: $CHAIN_HASH" >&2
              exit 1
          fi

          SCHEMA_HASH=$(curl -sf http://127.0.0.1:12346/v1/rollup/schema | jq -r .chain_hash)
          if [[ "$SCHEMA_HASH" != "$CHAIN_HASH" ]]; then
              echo "FAIL: schema chain_hash diverges: $SCHEMA_HASH vs $CHAIN_HASH" >&2
              exit 1
          fi
          echo "OK: chain_hash round-trips as $CHAIN_HASH"

          # === Step 3: slot encoding ===
          echo "=== slot encoding ==="
          for i in {1..60}; do
              LATEST=$(curl -sf http://127.0.0.1:12346/v1/ledger/slots/latest | jq -r .number)
              if [ "$LATEST" -ge 3 ]; then break; fi
              sleep 2
          done
          SLOT=$(curl -sf http://127.0.0.1:12346/v1/ledger/slots/3)
          echo "$SLOT" | jq
          SLOT_HASH=$(echo "$SLOT" | jq -r .hash)
          STATE_ROOT=$(echo "$SLOT" | jq -r .state_root)
          [[ "$SLOT_HASH" == lblk1* ]] || { echo "FAIL: slot.hash not bech32m: $SLOT_HASH" >&2; exit 1; }
          [[ "$STATE_ROOT" == lsr1* ]]  || { echo "FAIL: state_root not bech32m: $STATE_ROOT" >&2; exit 1; }
          echo "OK: slot bech32m encoding correct"

          # === Step 4: real transfer + DA submit -> finalize round-trip ===
          #
          # Submit a 1-AVOW `demo1 -> demo2` transfer via the released
          # `ligate` cli, wait for sequencer-side inclusion, then wait
          # for the blob to land on Celestia (`ligate_da_finalization_latency_seconds_count`
          # is the metric the chain emits when the batch is finalized
          # on the DA layer). Hard-asserts both. This is the path that
          # was tracked as a follow-up in ligate-chain#333; the
          # tx-less smoke could only WARN on the DA metric because no
          # transaction ever forced the sequencer to produce a batch.
          #
          # `--chain-id` is the *numeric* form (u64) from
          # `constants.toml`'s `CHAIN_ID = 4242`, not the string
          # `chain_id = "ligate-devnet-2"` from `celestia.toml`.
          # `--chain-hash` is pulled live so the smoke survives any
          # future chain_hash bump without a manual workflow edit.
          # `--token-id` comes from the generated genesis (the bech32m
          # `token_1...` value is deterministic across substitutions —
          # it's derived from the gas-token name+symbol, not from the
          # `lig1` addresses we substituted).
          # Wait for chain to be in sync with the DA tip before
          # submitting. The sequencer's `accept_tx` refuses tx with a
          # 503 `Syncing` while `synced_da_height < target_da_height -
          # margin`; that error caused the first #333 smoke iteration
          # to fail even with the catch-up'd light node (chain processes
          # DA blocks slower than the light node syncs them, so there's
          # a brief lag between boot and full sync). `/ready` returns
          # 200 once chain reports `{"status":"synced", ...}`, 503 with
          # `{"status":"syncing", synced_da_height, target_da_height}`
          # while catching up. ~3 min budget; catchup-from-anchor at
          # NetworkHead-50 finishes in well under that.
          echo "=== waiting for chain DA sync ==="
          for i in {1..90}; do
              if curl -sf http://127.0.0.1:12346/ready >/dev/null 2>&1; then
                  echo "OK: chain reports synced ($(curl -sf http://127.0.0.1:12346/ready))"
                  break
              fi
              if [ $((i % 6)) -eq 0 ]; then
                  echo "  iter $i: $(curl -s http://127.0.0.1:12346/ready)"
              fi
              sleep 2
          done
          if ! curl -sf http://127.0.0.1:12346/ready >/dev/null 2>&1; then
              echo "FAIL: chain never reached /ready=200 (still syncing after 3 min)" >&2
              curl -s http://127.0.0.1:12346/ready >&2 || true
              exit 1
          fi

          echo "=== submit transfer + verify DA finalization ==="
          DEMO2_ADDR=$(cat /tmp/keys/demo2.address)
          AVOW_TOKEN_ID=$(jq -r .avow_token_id /tmp/genesis/attestation.json)
          CHAIN_ID=4242
          echo "  chain_id=${CHAIN_ID} chain_hash=${CHAIN_HASH} token_id=${AVOW_TOKEN_ID}"
          echo "  recipient=${DEMO2_ADDR}"

          TX_OUT=$(ligate \
              --rpc http://127.0.0.1:12346 \
              transfer \
              --to "$DEMO2_ADDR" \
              --amount 1 \
              --signer demo1 \
              --keystore /tmp/keys \
              --chain-id "$CHAIN_ID" \
              --chain-hash "$CHAIN_HASH" \
              --token-id "$AVOW_TOKEN_ID" \
              --json)
          echo "$TX_OUT" | jq
          TX_HASH=$(echo "$TX_OUT" | jq -r .tx_hash)
          if [[ "$TX_HASH" != ltx1* ]]; then
              echo "FAIL: tx_hash is not bech32m ltx1: $TX_HASH" >&2
              exit 1
          fi
          echo "OK: transfer submitted, tx_hash=$TX_HASH"

          # Wait for the chain to ledger the tx (sequencer-side
          # inclusion, fast — within a slot). The endpoint 404s until
          # the tx is included.
          echo "=== waiting for tx inclusion ==="
          for i in {1..30}; do
              if curl -sf "http://127.0.0.1:12346/v1/ledger/txs/${TX_HASH}" >/dev/null 2>&1; then
                  echo "OK: tx visible at /v1/ledger/txs/${TX_HASH} after ${i} polls"
                  break
              fi
              sleep 2
          done
          if ! curl -sf "http://127.0.0.1:12346/v1/ledger/txs/${TX_HASH}" >/dev/null 2>&1; then
              echo "FAIL: tx never appeared at /v1/ledger/txs/${TX_HASH}" >&2
              exit 1
          fi

          # Wait for Celestia finalization. Mocha block time is ~6s
          # and `ligate_da_finalization_latency_seconds_count` is
          # lazily registered (absent until the first observation),
          # so we poll the file rather than grep-ing for a count that
          # might not exist yet. ~10 min worst-case budget.
          echo "=== waiting for DA finalization ==="
          METRICS_FILE=/tmp/smoke-metrics.txt
          DA_COUNT=""
          for i in {1..60}; do
              curl -sf http://127.0.0.1:9100/metrics -o "$METRICS_FILE" || true
              DA_COUNT=$(awk '/^ligate_da_finalization_latency_seconds_count /{print $2; exit}' "$METRICS_FILE")
              if [ -n "$DA_COUNT" ] && awk "BEGIN { exit ($DA_COUNT > 0) ? 0 : 1 }"; then
                  echo "OK: DA finalization count = ${DA_COUNT} (after ${i} polls × 10s)"
                  break
              fi
              sleep 10
          done

          # Hard-assert. The smoke now produces a real tx, so the
          # metric is required (no more WARN-not-fail).
          if [ ! -s "$METRICS_FILE" ]; then
              echo "FAIL: /metrics endpoint returned an empty body" >&2
              exit 1
          fi
          LIGATE_METRIC_LINES=$(grep -c '^ligate_' "$METRICS_FILE" || true)
          echo "OK: /metrics endpoint up (${LIGATE_METRIC_LINES} ligate_* metric lines)"
          if [ -z "$DA_COUNT" ] || ! awk "BEGIN { exit ($DA_COUNT > 0) ? 0 : 1 }"; then
              echo "FAIL: ligate_da_finalization_latency_seconds_count never incremented after a real submit" >&2
              echo "Last ligate_da_* snapshot:" >&2
              grep -E '^ligate_da_' "$METRICS_FILE" >&2 || echo "(no ligate_da_* metrics)" >&2
              exit 1
          fi

          echo "=== SMOKE PASSED ==="

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: mocha-smoke-logs
          path: |
            /tmp/ligate-node.log
            /tmp/celestia.log
          retention-days: 14
