name: Release

# Triggered on `v*` tag pushes. Cross-compiles `ligate-node` for the
# four target platforms operators and developers run on (linux x86_64,
# linux arm64, darwin arm64, darwin amd64), packages each as a tarball
# with a SHA-256 checksum,
# and attaches them to a GitHub Release with the unreleased section
# of `CHANGELOG.md` as release notes.
#
# This drops the "compile Rust on the VM for ~20 minutes" step from
# the operator runbook (`docs/development/public-devnet-deploy.md`)
# and matches the distribution shape Cosmos / Sui / Aptos / etc. use
# at devnet.
#
# Tracking issue: #194.
#
# Tagging convention (clean semver, no network-name suffix):
#   - Pre-mainnet:     `v0.x.y` (the `v0.x` numbering itself signals
#                      "pre-1.0, unstable"; nothing else needed).
#   - Mainnet RC:      `v1.0.0-rc.1`, `v1.0.0-rc.2`, ...
#   - Mainnet GA:      `v1.0.0` and forward.
#
# Network identity (`chain_id = "ligate-devnet-1"`, future
# `"ligate-testnet-1"` / `"ligate-mainnet-1"`) lives in the genesis
# config and chain spec, NOT in the binary tag — the same `ligate-node`
# binary boots whichever network it's pointed at via
# `--rollup-config-path` + `--genesis-config-dir`. Matches the pattern
# every mature chain uses (Solana, Aptos, Cosmos, etc.).
#
# Historical tags `v0.1.0-devnet` and `v0.1.1-devnet` predate this
# convention and stay as-is.
#
# This workflow does NOT include cosign signing for v0; add as a
# follow-up if downstream consumers want provenance verification.

on:
  push:
    tags:
      - 'v*'
  # Allow a maintainer to dry-run the build path without tagging.
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Same risc0-skip rationale as CI: the host binary builds cleanly
  # without invoking the guest. Real proving lives in a separate
  # workflow once Phase A.4 lands.
  SKIP_GUEST_BUILD: "1"

jobs:
  # Build matrix: one job per (target, runner). We use native runners
  # rather than cross-compiling so we don't have to manage a Docker
  # toolchain image. GitHub's hosted arm64 runners are GA and free
  # for public repos as of 2025.
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            archive_suffix: linux-amd64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            archive_suffix: linux-arm64
          - target: aarch64-apple-darwin
            runner: macos-14
            archive_suffix: darwin-arm64
          # Intel Mac restored 2026-05-24 (chain#358). Original
          # removal (PR #227, 2026-05-15) was driven by 1-4h queue
          # waits on GitHub's hosted Intel pool; the pool's typical
          # wait dropped under 5min by mid-2026. Re-add for the
          # operators on 2018-2019 Intel Mac hardware who can't run
          # the darwin-arm64 binary natively. Falls back to
          # `cargo install --git` if this entry breaks again.
          - target: x86_64-apple-darwin
            runner: macos-13
            archive_suffix: darwin-amd64
          # Static musl binaries (chain#358). The audience is anyone
          # running `ligate-node` in Alpine, distroless, or `scratch`
          # Docker images. Static-linking dodges glibc-version drift
          # between the build runner and the deploy host (we hit this
          # with GLIBC 2.39 vs Debian 12's 2.36 — see
          # `docs/development/public-devnet-deploy.md`'s OS-choice
          # note). musl-tools install + `rustup target add` happens
          # in the conditional step below.
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-24.04
            archive_suffix: linux-amd64-musl
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            archive_suffix: linux-arm64-musl
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Need full history for the changelog excerpt step.
          fetch-depth: 0

      - name: Compute version
        id: version
        shell: bash
        run: |
          # Tag push: use the tag (e.g. v0.0.1) stripped of the leading 'v'.
          # workflow_dispatch: use the short SHA so dry-runs produce a
          # uniquely-named artifact.
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="dryrun-${{ github.sha }}"
            VERSION="${VERSION:0:18}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux runners need libclang-dev for `clang-sys` (pulled in
      # transitively via risc0's build deps). The same install step
      # appears in `ci.yml`.
      - name: Install libclang (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang

      # musl targets need `musl-tools` (provides musl-gcc) so cargo
      # can link the produced binary statically against musl libc.
      # Also need to register the target with rustup since
      # dtolnay/rust-toolchain only auto-installs `${{ matrix.target }}`
      # the first time it appears, and the runner image's default
      # toolchain doesn't ship the musl targets.
      - name: Install musl-tools (musl targets only)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get install -y musl-tools
          rustup target add "${{ matrix.target }}"

      # macOS runners ship Xcode + CLI tools, but `libclang.dylib`
      # lives inside the active developer toolchain rather than on
      # the default dyld search path. `librocksdb-sys` and
      # `clang-sys` both load `libclang.dylib` at build-script
      # runtime; without `LIBCLANG_PATH` / `DYLD_FALLBACK_LIBRARY_PATH`
      # set, dyld can't find it and the build aborts with SIGABRT.
      #
      # Resolve the toolchain lib dir dynamically via `xcrun` so the
      # path tracks whatever Xcode version GitHub's runner image
      # currently ships. Sanity-checks via `ls` to fail loudly if
      # the dylib isn't where we expect.
      #
      # Mirrors the per-machine workaround documented in
      # `~/Desktop/ligate-docs/chain/STATE.md` under "Local dev
      # workflow on macOS".
      - name: Set LIBCLANG_PATH (macOS only)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -eu
          LIBCLANG_DIR="$(dirname $(dirname $(xcrun --find clang)))/lib"
          ls -la "${LIBCLANG_DIR}/libclang.dylib"
          echo "LIBCLANG_PATH=${LIBCLANG_DIR}" >> "$GITHUB_ENV"
          echo "DYLD_FALLBACK_LIBRARY_PATH=${LIBCLANG_DIR}" >> "$GITHUB_ENV"

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-release-

      - name: Build ligate-node (release)
        shell: bash
        run: |
          cargo build --release --bin ligate-node --target "${{ matrix.target }}"

      - name: Strip + package
        id: package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TARGET="${{ matrix.target }}"
          SUFFIX="${{ matrix.archive_suffix }}"
          BIN_DIR="target/${TARGET}/release"
          ARCHIVE_DIR="ligate-node-${VERSION}-${SUFFIX}"
          mkdir -p "${ARCHIVE_DIR}"
          cp "${BIN_DIR}/ligate-node" "${ARCHIVE_DIR}/"

          # Strip symbols where the platform supports it. Darwin's
          # `strip` differs from GNU; both are no-ops on a binary
          # already built without debug info but the call is safe.
          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            strip "${ARCHIVE_DIR}/ligate-node" || true
          elif [[ "${RUNNER_OS}" == "macOS" ]]; then
            strip "${ARCHIVE_DIR}/ligate-node" || true
          fi

          # Include LICENSE-* and a small README pointer with the
          # checksum so the tarball is self-describing.
          cp LICENSE-APACHE LICENSE-MIT "${ARCHIVE_DIR}/" || true

          ARCHIVE="${ARCHIVE_DIR}.tar.gz"
          tar -czf "${ARCHIVE}" "${ARCHIVE_DIR}"

          # SHA-256 portable across the runners.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          else
            shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          fi

          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"
          echo "checksum=${ARCHIVE}.sha256" >> "$GITHUB_OUTPUT"
          ls -lh "${ARCHIVE}" "${ARCHIVE}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ligate-node-${{ matrix.archive_suffix }}
          # Both the tarball and the .sha256, so the release job can
          # attach both without re-globbing per matrix shape.
          path: |
            ligate-node-*-${{ matrix.archive_suffix }}.tar.gz
            ligate-node-*-${{ matrix.archive_suffix }}.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    # Only publish on a real tag push. workflow_dispatch builds run
    # the matrix above (smoke test) but skip the publish step.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout (for CHANGELOG access)
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Stage artifacts for release
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          # Each matrix job uploads under `ligate-node-${archive_suffix}/`.
          # Flatten into one directory the release tool can glob.
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.sha256' \) -exec cp {} release/ \;
          ls -lh release/

      - name: Stage unversioned tarball aliases (`/releases/latest/download/` URLs)
        shell: bash
        run: |
          set -euo pipefail
          # Publish each tarball ALSO under an unversioned name so docs
          # can link to `releases/latest/download/ligate-node-<arch>.tar.gz`
          # and never need a manual version bump in the install commands.
          # The versioned originals stay in place for operators who pin
          # to a specific tag for reproducible deploys.
          cd release
          for f in ligate-node-*-*.tar.gz; do
            # `ligate-node-0.2.13-linux-amd64.tar.gz` → `ligate-node-linux-amd64.tar.gz`
            unversioned=$(echo "$f" | sed -E 's/-[0-9]+\.[0-9]+\.[0-9]+-/-/')
            cp "$f" "$unversioned"
            cp "$f.sha256" "$unversioned.sha256"
            # The sha256 sidecar embeds the filename it was computed
            # against; rewrite to point at the unversioned name so
            # `sha256sum -c` still verifies after the rename.
            sed -i -E "s|ligate-node-[0-9]+\.[0-9]+\.[0-9]+-|ligate-node-|" "$unversioned.sha256"
          done
          ls -lh

      - name: Extract changelog excerpt
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          # Find the CHANGELOG section that matches the tag being built
          # (e.g. tag `v0.1.3` → `## [0.1.3] - YYYY-MM-DD`). Our release
          # hygiene folds `[Unreleased]` INTO the new version section
          # BEFORE tagging (Keep-a-Changelog standard), so by tag-push
          # time `[Unreleased]` is empty and the entries live under the
          # versioned header. Extract that block.
          #
          # If the tag is `v*-rc.N` or some other non-version-named tag
          # we couldn't classify, fall back to `[Unreleased]` so we
          # don't ship blank release bodies (the historic bug that
          # silently shipped v0.1.2 with an empty body).
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          # Try the version-specific section first.
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" {capture=1; next}
            /^## / {if (capture) {capture=0}}
            capture==1 {print}
          ' CHANGELOG.md > release-notes.md

          # If empty, try `[Unreleased]` (covers RC tags or pre-fold
          # workflow dispatches).
          if [[ "$(wc -c < release-notes.md | tr -d ' ')" -le 1 ]]; then
            awk '
              /^## \[Unreleased\]/ {capture=1; next}
              /^## / {if (capture) {capture=0}}
              capture==1 {print}
            ' CHANGELOG.md > release-notes.md
          fi

          # If STILL empty/whitespace-only, fall back to a one-liner so
          # the release page never ships a blank body.
          if [[ "$(wc -c < release-notes.md | tr -d ' ')" -le 1 ]]; then
            echo "_(No changelog entries found for ${VERSION}; see commit history.)_" > release-notes.md
          fi

          echo "Release notes preview (${VERSION}):"
          head -40 release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: release/*
          # Treat ONLY tags containing `-rc.` as pre-release (true
          # release candidates). `-devnet` / `-testnet` tags are
          # "current public network" releases -- pinned, canonical for
          # that network's lifetime -- and ship as normal releases.
          # Full mainnet uses `vX.Y.Z` plain.
          prerelease: ${{ contains(github.ref_name, '-rc.') }}
          fail_on_unmatched_files: true

      - name: Dispatch `chain-released` to downstream repos
        # Notifies the `bump-versions.yml` workflow in each downstream
        # repo so they auto-PR a version-pin bump within ~30 s of a
        # new release (instead of the daily-cron fallback). Skipped on
        # any failure earlier in this job; the daily cron path is the
        # safety net.
        if: success() && !contains(github.ref_name, '-rc.')
        env:
          PAT: ${{ secrets.DOWNSTREAM_DISPATCH_PAT }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${PAT:-}" ]]; then
            echo "::warning::DOWNSTREAM_DISPATCH_PAT not set; skipping dispatch. Daily cron in receivers will catch the bump within 24h."
            exit 0
          fi
          for repo in ligate-io/docs ligate-io/ligate-marketing ligate-io/ligate-chain; do
            echo "→ dispatching chain-released to ${repo}"
            curl -fsSL -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${PAT}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${repo}/dispatches" \
              -d "{\"event_type\":\"chain-released\",\"client_payload\":{\"version\":\"${TAG#v}\",\"tag\":\"${TAG}\"}}" \
              || echo "::warning::dispatch to ${repo} failed (non-fatal; daily cron will catch up)"
          done
